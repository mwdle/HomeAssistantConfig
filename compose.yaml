name: HomeAssistant
services: # TODO: Include resource limits for all containers in this stack
  MQTT:
    image: eclipse-mosquitto:2.1.2-alpine@sha256:9cfdd46ad59f3e3e5f592f6baf57ab23e1ad00605509d0f5c1e9b179c5314d87
    container_name: MQTT
    restart: unless-stopped
    hostname: mqtt
    networks:
      - HomeAssistant
      - Frigate
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ${DOCKER_VOLUMES}/MQTT/mosquitto.passwd:/mosquitto/config/mosquitto.passwd:ro

    user: "${UID}:${GID}"
    read_only: true
    security_opt:
      - no-new-privileges:true

    deploy:
      resources:
        limits:
          cpus: 0.25
          memory: 32M
          pids: 2

  Frigate:
    image: ghcr.io/blakeblackshear/frigate:0.17.1@sha256:1724960349dad0bd2ae8ec884171a6fd5755a4dc242a0e66cadbda9c0e85c99b
    container_name: Frigate
    restart: unless-stopped
    cap_add:
      - PERFMON # Required for hardware acceleration. This allows access intel_gpu_top command for gpu stats.
    shm_size: 256M # https://docs.frigate.video/frigate/installation/#calculating-required-shm-size
    devices:
      - /dev/dri/renderD128 # For intel hwaccel, needs to be updated for your hardware
    ports:
      - 8555:8555 # WebRTC
    hostname: frigate
    networks:
      - Frigate
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKER_VOLUMES}/Frigate:/config
      - frigate_media:/media/frigate
      - type: tmpfs # Optional: 1GB of memory, reduces SSD/SD Card wear
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    environment:
      FRIGATE_RTSP_USER: "${RTSP_USER}"
      FRIGATE_RTSP_PASSWORD: "${RTSP_PASSWORD}"
      FRIGATE_MQTT_USER: "${MQTT_USER}"
      FRIGATE_MQTT_PASSWORD: "${MQTT_PASSWORD}"
    depends_on:
      - MQTT

    user: "${UID}:${GID}"
    read_only: true
    security_opt:
      - no-new-privileges:true

  MusicAssistant:
    container_name: MusicAssistant
    image: ghcr.io/music-assistant/server:2.8.1@sha256:980fab61d07cbccbf7bbe7b5d7fa53cbc9cc04a66146e656bda9329886c2c396
    restart: unless-stopped
    hostname: musicassistant
    networks:
      AAA_LAN:
        mac_address: 0A:00:00:00:00:01 # Set static LAN MAC address for container (e.g. MAC address used in `AAA_LAN` MacVLAN network persists between container stops/starts)
      MusicAssistant:
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKER_VOLUMES}/MusicAssistant:/data
      - ${MUSIC_VOLUME}:/media:ro # Read only is necessary if you're mounting music from a folder within Nextcloud's internal storage in order to prevent data corruption and other issues.

  Chrome: # Allows running Selenium scripts using Pyscript within Home Assistant
    image: selenium/standalone-chromium:145.0.7632.109-chromedriver-145.0.7632.109@sha256:36474a4c56765ec3d04dc4cbac57a021e0d88e89fdb5dca297a50f1100279c1a
    container_name: Chrome
    restart: unless-stopped
    hostname: chrome
    shm_size: 2g # Required unless using option `--disable-dev-shm-usage`
    networks:
      - Chrome
    environment:
      - SE_START_VNC=false
      - SE_START_NO_VNC=false
      - SE_START_XVFB=false
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2GB

  Glances:
    image: docker.io/nicolargo/glances:4.5.2@sha256:9ad411687dac6aee071d34f4408e2a9b4d0651acdff4db0544656d0f1224029e
    container_name: Glances
    restart: unless-stopped
    pid: host
    hostname: glances
    networks:
      Glances:
    environment:
      - GLANCES_OPT=-w --disable-webui # Enable webserver mode (which is required to use the Home Assistant integration)
      - TZ=America/Denver
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # Allow Glances to report information about the state of Docker Containers on the host

  MatterHub:
    image: ghcr.io/riddix/home-assistant-matter-hub:2.0.36@sha256:424d3cf30452799e0a5c624f55e5dca98b18aa5b8d7f8931ad48fb90f3886e7f
    container_name: MatterHub
    restart: unless-stopped
    hostname: matterhub
    network_mode: host
    environment:
      - HAMH_HOME_ASSISTANT_URL=http://172.31.255.254:8123/ # Connect to HomeAssistant via its static IP in the MatterHub Docker network defined at the bottom of this file. I was unable to get Matter Hub to work properly on a MacVLAN network -- host networking is required for this container which complicates communication with HomeAssistant container which IS on a MacVLAN network.
      - HAMH_HOME_ASSISTANT_ACCESS_TOKEN=${HA_ACCESS_TOKEN}
    volumes:
      - ${DOCKER_VOLUMES}/MatterHub:/data
    depends_on:
      - HomeAssistant

  HomeAssistant:
    image: ghcr.io/home-assistant/home-assistant:2026.4.1@sha256:8848691147f01a6eee7753de2ade21b04d6168fcd2e2a7089f6f84e3b7b86960
    container_name: HomeAssistant
    restart: unless-stopped
    hostname: homeassistant
    networks:
      AAA_LAN:
        mac_address: 0A:00:00:00:00:02 # Set static LAN MAC address for container (e.g. MAC address used in `AAA_LAN` MacVLAN network persists between container stops/starts)
      HomeAssistant:
      Chrome: # Used by pyscript `router_rebooter` module for Selenium within HA
      Glances:
      MatterHub:
        ipv4_address: 172.31.255.254 # MatterHub communicates with HomeAssistant via this static IP in the Docker network defined at the bottom -- this is the only way I managed to allow Matter Hub container in host networking mode to communicate with HomeAssistant which is on MacVLAN network.
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./configuration.yaml:/config/configuration.yaml:ro # Mount the configuration.yaml from this repository into the container
      - ./pyscript:/config/pyscript:ro # Mount pyscript apps folder from this repository into the container
      - ./pyscript_modules:/config/pyscript_modules:ro # Mount pyscript modules folder from this repository into the container
      - ${DOCKER_VOLUMES}/HomeAssistant:/config
    # Custom environment variables used within Pyscript for `router_rebooter` app:
    environment:
      - ROUTER_PASSWORD=${ROUTER_PASSWORD}
      - EXTENDER_PASSWORD=${EXTENDER_PASSWORD}
    depends_on:
      - MQTT
      - Frigate
      - MusicAssistant

networks:
  AAA_LAN:
    external: true
  HomeAssistant:
    external: true
  Chrome:
    external: true
  Frigate:
    external: true
  MusicAssistant:
    external: true
  Glances:
    external: true
  MatterHub: # Allows Matter Hub container running in host networking mode, to communicate with Home Assistant container whose primary gateway is a MacVLAN network. See services.MatterHub.environment in this file.
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.255.252/30

volumes:
  frigate_media:
