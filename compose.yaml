name: HomeAssistant
services:
  MQTT:
    image: eclipse-mosquitto:2.1.2-alpine@sha256:a908c65cc8e67ec9d292ef27c2c0360dbaaee7eb1b935cdd194e67697f15dea1
    container_name: MQTT
    restart: unless-stopped
    hostname: mqtt
    networks:
      - HomeAssistant
      - Frigate
    configs:
      - source: mqtt_config
        target: /mosquitto/config/mosquitto.conf
    volumes:
      - ${DOCKER_VOLUMES}/MQTT/mosquitto.passwd:/mosquitto/config/mosquitto.passwd:ro

    user: "${UID}:${GID}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: "journald"
    healthcheck:
      test: mosquitto_sub -t check -C 1 -W 4 2>&1 | grep -q 'not authorised' || exit 1
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 15s

    deploy:
      update_config:
        order: start-first
      resources:
        limits:
          cpus: 0.25
          memory: 32M
          pids: 4

  Frigate:
    image: ghcr.io/blakeblackshear/frigate:0.17.1@sha256:1724960349dad0bd2ae8ec884171a6fd5755a4dc242a0e66cadbda9c0e85c99b
    container_name: Frigate
    restart: unless-stopped
    shm_size: 256M # https://docs.frigate.video/frigate/installation/#calculating-required-shm-size
    devices:
      - /dev/dri/renderD128 # For intel hwaccel, needs to be updated for your hardware
    ports:
      # WebRTC
      - 8555:8555/tcp
      - 8555:8555/udp
    hostname: frigate
    networks:
      - Frigate
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKER_VOLUMES}/Frigate:/config
      - frigate_media:/media/frigate
      - type: tmpfs # Optional: 1GB of memory, reduces SSD/SD Card wear
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    environment:
      FRIGATE_MQTT_USER: "${MQTT_USER}"
      FRIGATE_MQTT_PASSWORD: "${MQTT_PASSWORD}"
    depends_on:
      - MQTT

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - NET_RAW
      - PERFMON # For Intel GPU stats

    logging:
      driver: "journald"

    deploy:
      resources:
        limits:
          cpus: 1
          memory: 2GB
          pids: 1024

  MusicAssistant:
    container_name: MusicAssistant
    image: ghcr.io/music-assistant/server:2.9.0@sha256:7e7269b20bafd7fabd1567bc0991fd30e894b05d205dacdaba8a2a3893982722
    restart: unless-stopped
    hostname: musicassistant
    networks:
      LAN:
        gw_priority: 1
      MusicAssistant:
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKER_VOLUMES}/MusicAssistant:/data
      - ${MUSIC_VOLUME}:/media:ro # Read only is necessary if you're mounting music from a folder within Nextcloud's internal storage in order to prevent data corruption and other issues.

    user: "${UID}:${GID}"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: "journald"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8095/ || exit 1
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          cpus: 2
          memory: 1GB
          pids: 128

  Chrome: # Allows running Selenium scripts using Pyscript within Home Assistant
    image: selenium/standalone-chromium:145.0.7632.109-chromedriver-145.0.7632.109@sha256:36474a4c56765ec3d04dc4cbac57a021e0d88e89fdb5dca297a50f1100279c1a
    container_name: Chrome
    restart: unless-stopped
    hostname: chrome
    networks:
      - Chrome
    environment:
      - SE_START_VNC=false
      - SE_START_NO_VNC=false
      - SE_START_XVFB=false
    volumes:
      - selenium_opt:/opt/selenium
      - selenium_home:/home/seluser

    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: "journald"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:4444/status || exit 1
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1GB
          pids: 256

  Glances:
    image: docker.io/nicolargo/glances:4.5.5@sha256:9ac5de7debffb1e5746654585daaf1d23179ea91fbdfd4c25a7a17945d9c74bf
    container_name: Glances
    restart: unless-stopped
    pid: host
    hostname: glances
    networks:
      Glances:
    environment:
      - GLANCES_OPT=-w --disable-webui # Enable webserver mode (which is required to use the Home Assistant integration)
      - TZ=America/Denver
      - USER=${UID} # Fix for running container as custom UID
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # Allow Glances to report information about the state of Docker Containers on the host

    user: "${UID}:${GID}"
    group_add:
      - ${DOCKER_GID} # Replace this with the output from `getent group docker | cut -d: -f3` on your host machine in order to ensure Glances has read permission for Docker Socket
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: journald
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://127.0.0.1:61208/api/4/status || exit 1
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 256M
          pids: 50

  MatterHub:
    image: ghcr.io/riddix/home-assistant-matter-hub:2.1.0-alpha.719@sha256:6d3194a0e6551595cabae173edfb38957a09494673f8915e7198d7213e3a02dd
    container_name: MatterHub
    restart: unless-stopped
    hostname: matterhub
    networks:
      LAN:
        gw_priority: 1
        mac_address: "0A:00:00:00:00:01" # Set static MAC address on macvlan interface (e.g. MAC address persists between container stops/starts for stable link local and ULA IPV6 addresses)
      MatterHub:
    environment:
      - HAMH_HOME_ASSISTANT_URL=http://HomeAssistant:8123/
      - HAMH_HOME_ASSISTANT_ACCESS_TOKEN=${HA_ACCESS_TOKEN}
      - HAMH_HTTP_PORT=8482
      - HAMH_MDNS_STRIP_GLOBAL_IPV6=true
    volumes:
      - ${DOCKER_VOLUMES}/MatterHub:/data
    depends_on:
      HomeAssistant:
        condition: service_healthy

    user: "${UID}:${GID}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: journald

    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 256M
          pids: 50

  Piper:
    image: rhasspy/wyoming-piper
    container_name: Piper
    restart: unless-stopped
    hostname: piper
    networks:
      Piper:
    command: --voice en_US-lessac-medium
    volumes:
      - ${DOCKER_VOLUMES}/Piper:/data

    user: "${UID}:${GID}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: journald
    healthcheck:
      test: bash -c '</dev/tcp/127.0.0.1/10200' 2>/dev/null || exit 1
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 30s

    # TODO: test resource limits
    # deploy:
    #   resources:
    #     limits:
    #       cpus: 0.5
    #       memory: 256M
    #       pids: 50

  Whisper:
    image: rhasspy/wyoming-whisper
    container_name: Whisper
    restart: unless-stopped
    hostname: whisper
    networks:
      Whisper:
    command: --model tiny-int8 --language en
    environment:
      - HF_HOME=/data/cache
    volumes:
      - ${DOCKER_VOLUMES}/Whisper:/data

    user: "${UID}:${GID}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: journald
    healthcheck:
      test: bash -c '</dev/tcp/127.0.0.1/10300' 2>/dev/null || exit 1
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 30s

    # TODO: test resource limits
    # deploy:
    #   resources:
    #     limits:
    #       cpus: 0.5
    #       memory: 256M
    #       pids: 50

  HomeAssistant:
    image: ghcr.io/home-assistant/home-assistant:2026.6.3@sha256:aed891b8f801072302815b4b0fab5adb714182967e9d2e2d4a2be558241c73ad
    container_name: HomeAssistant
    restart: unless-stopped
    hostname: homeassistant
    networks:
      LAN:
        gw_priority: 1
      HomeAssistant:
      Chrome: # Used by pyscript `router_rebooter` module for Selenium within HA
      Glances:
      MatterHub:
      Piper:
      Whisper:
    configs:
      - source: home_assistant_config
        target: /config/configuration.yaml
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./pyscript:/config/pyscript:ro # Mount pyscript apps folder from this repository into the container
      - ./pyscript_modules:/config/pyscript_modules:ro # Mount pyscript modules folder from this repository into the container
      - ${DOCKER_VOLUMES}/HomeAssistant:/config
    # Custom environment variables used within Pyscript for `router_rebooter` app:
    environment:
      - ROUTER_PASSWORD=${ROUTER_PASSWORD}
      - EXTENDER_PASSWORD=${EXTENDER_PASSWORD}
    depends_on:
      - Chrome
      - Frigate
      - Glances
      - MQTT
      - MusicAssistant
      - Piper
      - Whisper

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW # Required by HomeAssistant to watch DHCP packets

    logging:
      driver: journald
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ || exit 1
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: 2
          memory: 1.5GB
          pids: 256

networks:
  # macvlan network
  LAN:
    external: true
  # bridge networks
  HomeAssistant:
    external: true
  Chrome:
    external: true
  Frigate:
    external: true
  MusicAssistant:
    external: true
  Glances:
    external: true
  MatterHub:
    external: true
  Piper:
    external: true
  Whisper:
    external: true

configs:
  mqtt_config:
    file: ./mosquitto.conf
  home_assistant_config:
    file: ./configuration.yaml

volumes:
  frigate_media:
  selenium_opt:
  selenium_home:
