name: HomeAssistant
services:
  Frigate:
    image: ghcr.io/blakeblackshear/frigate:0.17.1@sha256:1724960349dad0bd2ae8ec884171a6fd5755a4dc242a0e66cadbda9c0e85c99b
    container_name: Frigate
    restart: unless-stopped
    shm_size: 256M # https://docs.frigate.video/frigate/installation/#calculating-required-shm-size
    devices:
      - /dev/dri/renderD128 # For intel hwaccel, needs to be updated for your hardware
    ports:
      # WebRTC
      - 8555:8555/tcp
      - 8555:8555/udp
    hostname: frigate
    networks:
      - Frigate
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKER_VOLUMES}/Frigate:/config
      - frigate_media:/media/frigate
      - type: tmpfs # Optional: 1GB of memory, reduces SSD/SD Card wear
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    environment:
      FRIGATE_MQTT_USER: "${MQTT_USER}"
      FRIGATE_MQTT_PASSWORD: "${MQTT_PASSWORD}"
    depends_on:
      - MQTT

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - NET_RAW
      - PERFMON # For Intel GPU stats

    logging:
      driver: "journald"

    deploy:
      resources:
        limits:
          cpus: 1
          memory: 2GB
          pids: 1024

  Glances:
    image: docker.io/nicolargo/glances:4.5.5@sha256:9ac5de7debffb1e5746654585daaf1d23179ea91fbdfd4c25a7a17945d9c74bf
    container_name: Glances
    restart: unless-stopped
    pid: host
    hostname: glances
    networks:
      Glances:
    environment:
      - GLANCES_OPT=-w --disable-webui # Enable webserver mode (which is required to use the Home Assistant integration)
      - TZ=America/Denver
      - USER=${UID} # Fix for running container as custom UID
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # Allow Glances to report information about the state of Docker Containers on the host

    user: "${UID}:${GID}"
    group_add:
      - ${DOCKER_GID} # Replace this with the output from `getent group docker | cut -d: -f3` on your host machine in order to ensure Glances has read permission for Docker Socket
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: journald
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://127.0.0.1:61208/api/4/status || exit 1
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 256M
          pids: 50

  HomeAssistant:
    image: ghcr.io/home-assistant/home-assistant:2026.6.4@sha256:adb3341e31e03e0048e60d8c1cf952e118a381ae258bb921d3da12a3b27bf0c2
    container_name: HomeAssistant
    restart: unless-stopped
    hostname: homeassistant
    networks:
      LAN:
        gw_priority: 1
        ipv4_address: 10.0.11.11
      HomeAssistant:
      Glances:
      Piper:
      Whisper:
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./pyscript:/config/pyscript:ro # Mount pyscript apps folder from this repository into the container
      - ./pyscript_modules:/config/pyscript_modules:ro # Mount pyscript modules folder from this repository into the container
      - ${DOCKER_VOLUMES}/HomeAssistant:/config
      # Required for Bluetooth
      - /var/run/dbus:/run/dbus:ro
    depends_on:
      - Frigate
      - Glances
      - MQTT
      - MusicAssistant
      - Piper
      - Whisper

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW # Required for DHCP / Bluetooth capabilities
      - NET_ADMIN # Required for Bluetooth

    logging:
      driver: journald
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ || exit 1
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: 2
          memory: 1.5GB
          pids: 256

  MQTT:
    image: eclipse-mosquitto:2.1.2-alpine@sha256:6f8d8a947c506f8a2290ec65cd4bd2bc7cb4d43fb5f6271f861cb013e2ef9797
    container_name: MQTT
    restart: unless-stopped
    hostname: mqtt
    networks:
      - HomeAssistant
      - Frigate
    configs:
      - source: mqtt_config
        target: /mosquitto/config/mosquitto.conf
    volumes:
      - ${DOCKER_VOLUMES}/MQTT/mosquitto.passwd:/mosquitto/config/mosquitto.passwd:ro

    user: "${UID}:${GID}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: "journald"
    healthcheck:
      test: mosquitto_sub -t check -C 1 -W 4 2>&1 | grep -q 'not authorised' || exit 1
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 15s

    deploy:
      update_config:
        order: start-first
      resources:
        limits:
          cpus: 0.25
          memory: 32M
          pids: 4

  MusicAssistant:
    container_name: MusicAssistant
    image: ghcr.io/music-assistant/server:2.9.4@sha256:e5dbb44e9dc92ff95dd2b15a9176b238f4e0969aed89850bf428b3d424640ca3
    restart: unless-stopped
    hostname: musicassistant
    networks:
      LAN:
        gw_priority: 1
        ipv4_address: 10.0.11.12
      MusicAssistant:
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKER_VOLUMES}/MusicAssistant:/data
      - ${MUSIC_VOLUME}:/media:ro # Read only is necessary if you're mounting music from a folder within Nextcloud's internal storage in order to prevent data corruption and other issues.

    user: "${UID}:${GID}"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: "journald"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8095/ || exit 1
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          cpus: 2
          memory: 1GB
          pids: 128

  Piper:
    image: rhasspy/wyoming-piper:2.2.2@sha256:c874e4a04657ae3381332ee5d0c8c70a310dae6722892840f530ac0890b44eb3
    container_name: Piper
    restart: unless-stopped
    hostname: piper
    networks:
      Piper:
    command: --voice en_US-lessac-medium
    volumes:
      - ${DOCKER_VOLUMES}/Piper:/data

    user: "${UID}:${GID}"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: journald
    healthcheck:
      test: bash -c '</dev/tcp/127.0.0.1/10200' 2>/dev/null || exit 1
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: 1
          memory: 512M
          pids: 50

  Whisper:
    image: rhasspy/wyoming-whisper:3.3.1@sha256:258956d1508a042ae52ceca04da85f6e74e7fab81676e3678619b8047e88c721
    container_name: Whisper
    restart: unless-stopped
    hostname: whisper
    networks:
      Whisper:
    command: --model tiny-int8 --language en
    environment:
      - HF_HOME=/data/cache
    volumes:
      - ${DOCKER_VOLUMES}/Whisper:/data

    user: "${UID}:${GID}"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: journald
    healthcheck:
      test: bash -c '</dev/tcp/127.0.0.1/10300' 2>/dev/null || exit 1
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: 2
          memory: 512M
          pids: 50

networks:
  # macvlan network
  LAN:
    external: true
  # bridge networks
  Frigate:
    external: true
  Glances:
    external: true
  HomeAssistant:
    external: true
  MusicAssistant:
    external: true
  Piper:
    external: true
  Whisper:
    external: true

configs:
  mqtt_config:
    file: ./mosquitto.conf

volumes:
  frigate_media:
